alarm_fire:
  alias: "Alarm: Fire Sirens"
  mode: parallel
  fields:
    reason:
      description: Why we’re firing (door|motion|tamper|chime|escalate)
      example: "door"
    ringtone:
      description: Ringtone text (e.g. 'ringtone 5')
      example: "ringtone 5"
    volume:
      description: Volume (low|medium|high|mute)
      example: "high"
    seconds:
      description: Duration seconds
      example: 60
  sequence:
    - variables:
        upstairs: zigbee2mqtt/upstairs_alarm
        downstairs: zigbee2mqtt/downstairs_alarm
        dur: "{{ seconds | default(states('input_number.alarm_siren_seconds')|int, true) }}"
    # Set ringtone/volume first
    - service: mqtt.publish
      data:
        topic: "{{ downstairs }}/set/ringtone"
        payload: "{{ ringtone }}"
    - service: mqtt.publish
      data:
        topic: "{{ upstairs }}/set/ringtone"
        payload: "{{ ringtone }}"
    - service: mqtt.publish
      data:
        topic: "{{ downstairs }}/set/volume"
        payload: "{{ volume }}"
    - service: mqtt.publish
      data:
        topic: "{{ upstairs }}/set/volume"
        payload: "{{ volume }}"
    # Turn ON both sirens
    - service: mqtt.publish
      data:
        topic: "{{ downstairs }}/set/alarm"
        payload: "ON"
    - service: mqtt.publish
      data:
        topic: "{{ upstairs }}/set/alarm"
        payload: "ON"
    # Mark "triggered" unless this is just a chime
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ reason != 'chime' }}"
          sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.alarm_triggered
    # Hold, then OFF
    - delay:
        seconds: "{{ dur }}"
    - service: mqtt.publish
      data:
        topic: "{{ downstairs }}/set/alarm"
        payload: "OFF"
    - service: mqtt.publish
      data:
        topic: "{{ upstairs }}/set/alarm"
        payload: "OFF"
