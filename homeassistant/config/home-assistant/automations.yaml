- id: '1743780808495'
  alias: 'Notification: Door Open Alert'
  description: ''
  triggers:
  - entity_id:
    - binary_sensor.main_door_ds_contact
    - binary_sensor.kitchen_balcony_ds_contact
    - binary_sensor.dinning_balcony_ds_contact
    from: 'on'
    to: 'off'
    trigger: state
  conditions:
  - condition: state
    entity_id: alarm_control_panel.alarmo
    state: armed_home
  actions:
  - data:
      topic: zigbee2mqtt/downstairs_alarm/set/volume
      payload: medium
    action: mqtt.publish
  - data:
      topic: zigbee2mqtt/upstairs_alarm/set/volume
      payload: medium
    action: mqtt.publish
  - data:
      topic: zigbee2mqtt/downstairs_alarm/set/ringtone
      payload: ringtone 11
    action: mqtt.publish
  - data:
      topic: zigbee2mqtt/upstairs_alarm/set/ringtone
      payload: ringtone 11
    action: mqtt.publish
  - delay: 00:00:03
  - data:
      topic: zigbee2mqtt/downstairs_alarm/set/alarm
      payload: 'OFF'
    action: mqtt.publish
  - data:
      topic: zigbee2mqtt/upstairs_alarm/set/alarm
      payload: 'OFF'
    action: mqtt.publish
  mode: single
