- id: '1743266894358'
  alias: 'Alarm: Activate Sirens'
  triggers:
  - entity_id: alarm_control_panel.alarmo
    to: triggered
    trigger: state
  actions:
  - data:
      topic: zigbee2mqtt/downstairs_alarm/set/alarm
      payload: 'ON'
    action: mqtt.publish
  - data:
      topic: zigbee2mqtt/upstairs_alarm/set/alarm
      payload: 'ON'
    action: mqtt.publish
  mode: single
- id: '1743266924965'
  alias: 'Alarm: Set Ringtone Based on Event'
  triggers:
  - entity_id: alarm_control_panel.alarmo
    to: triggered
    trigger: state
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ states(''alarm_control_panel.alarmo'') == ''triggered''
          }}'
      sequence:
      - data:
          topic: zigbee2mqtt/downstairs_alarm/set/ringtone
          payload: ringtone 3
        action: mqtt.publish
      - data:
          topic: zigbee2mqtt/upstairs_alarm/set/ringtone
          payload: ringtone 3
        action: mqtt.publish
  mode: single
- id: '1743266952826'
  alias: 'Alarm: Escalate on Repeated Motion'
  triggers:
  - entity_id:
    - binary_sensor.ms_dining_occupancy
    - binary_sensor.ms_kitchen_occupancy
    - binary_sensor.ms_stairs_occupancy
    from: 'off'
    to: 'on'
    for:
      seconds: 30
    trigger: state
  conditions:
  - condition: state
    entity_id: alarm_control_panel.alarmo
    state: triggered
  actions:
  - data:
      topic: zigbee2mqtt/downstairs_alarm/set/volume
      payload: high
    action: mqtt.publish
  - data:
      topic: zigbee2mqtt/upstairs_alarm/set/volume
      payload: high
    action: mqtt.publish
  - data:
      topic: zigbee2mqtt/downstairs_alarm/set/ringtone
      payload: ringtone 10
    action: mqtt.publish
  - data:
      topic: zigbee2mqtt/upstairs_alarm/set/ringtone
      payload: ringtone 10
    action: mqtt.publish
  mode: single
- id: '1743266981216'
  alias: 'Alarm: Increase Volume on Escalation'
  description: ''
  triggers:
  - topic: alarm/escalate
    trigger: mqtt
  conditions: []
  actions:
  - data:
      topic: zigbee2mqtt/downstairs_alarm/set/volume
      payload: high
    action: mqtt.publish
  - data:
      topic: zigbee2mqtt/upstairs_alarm/set/volume
      payload: high
    action: mqtt.publish
  - data:
      topic: zigbee2mqtt/downstairs_alarm/set/ringtone
      payload: ringtone 10
    action: mqtt.publish
  - data:
      topic: zigbee2mqtt/upstairs_alarm/set/ringtone
      payload: ringtone 10
    action: mqtt.publish
  mode: single
- id: '1743291742745'
  alias: Trigger Sirens when Alarmo is Activated
