x-logging: &default-logging
  options:
    max-size: "10m"
    max-file: "3"

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    env_file: ../.env
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    ports:
      - "127.0.0.1:${JELLYFIN_PORT}:8096"
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/tvseries:/data/tvshows
      - ./jellyfin/movies:/data/movies
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  photoprism-db:
    image: mariadb:10.11
    container_name: photoprism-db
    restart: unless-stopped
    env_file: ../.env
    command:
      - --innodb-buffer-pool-size=256M
      - --transaction-isolation=READ-COMMITTED
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=100
    environment:
      TZ: ${TZ}
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_INITDB_SKIP_TZINFO: "1"
      MARIADB_DATABASE: photoprism
      MARIADB_USER: photoprism
      MARIADB_PASSWORD: ${PHOTOPRISM_MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${PHOTOPRISM_MARIADB_ROOT_PASSWORD}
    volumes:
      - ./photoprism/database:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 30s
      timeout: 5s
      retries: 5
    logging: *default-logging

  photoprism:
    image: photoprism/photoprism:latest
    container_name: photoprism
    restart: unless-stopped
    depends_on:
      photoprism-db:
        condition: service_healthy
    env_file: ../.env
    ports:
      - "127.0.0.1:${PHOTOPRISM_PORT}:2342"
    environment:
      TZ: ${TZ}
      PHOTOPRISM_ADMIN_USER: admin
      PHOTOPRISM_ADMIN_PASSWORD: ${PHOTOPRISM_ADMIN_PASSWORD}
      PHOTOPRISM_DATABASE_DRIVER: mysql
      PHOTOPRISM_DATABASE_SERVER: photoprism-db:3306
      PHOTOPRISM_DATABASE_NAME: photoprism
      PHOTOPRISM_DATABASE_USER: photoprism
      PHOTOPRISM_DATABASE_PASSWORD: ${PHOTOPRISM_MARIADB_PASSWORD}
      PHOTOPRISM_SITE_URL: ${PHOTOPRISM_SITE_URL}
      PHOTOPRISM_DISABLE_TLS: "true"
      PHOTOPRISM_INIT: "https"
      PHOTOPRISM_DISABLE_CHOWN: "true"
    volumes:
      - ./photoprism/media:/photoprism/originals
      - ./photoprism/storage:/photoprism/storage
    stop_grace_period: 15s
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    env_file: ../.env
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      WEBUI_PORT: 8080
    ports:
      - "127.0.0.1:${QBITTORRENT_WEBUI_PORT}:8080"
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - ./qbittorrent/appdata:/config
      - ./qbittorrent/downloads:/downloads
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
