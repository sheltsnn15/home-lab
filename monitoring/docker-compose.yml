x-logging: &default-logging
  options:
    max-size: "10m"
    max-file: "3"

services:
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - ./uptime-kuma:/app/data
    ports:
      - "127.0.0.1:${KUMA_PORT}:3001"
    logging: *default-logging
    networks:
      - monitoring-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    env_file: ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/hass.token:/etc/prometheus/hass.token:ro
      - ./prometheus/kuma.token:/etc/prometheus/kuma.token:ro
      - ./prometheus/prom-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - --storage.tsdb.retention.size=5GB
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT}:9090"
    depends_on:
      - node-exporter
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/ready" ]
      interval: 30s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - monitoring-net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    pid: "host"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
    ports:
      - "127.0.0.1:${NODE_EXPORTER_PORT}:9100"
    logging: *default-logging
    networks:
      - monitoring-net
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    env_file: ../.env
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - ./grafana:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT}:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/login" ]
      interval: 30s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - monitoring-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: false
    ports:
      - "127.0.0.1:${CADVISOR_PORT}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    logging: *default-logging
    networks:
      - monitoring-net

networks:
  monitoring-net:
