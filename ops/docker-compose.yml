x-logging: &default-logging
  options:
    max-size: "10m"
    max-file: "3"

services:
  diun:
    image: crazymax/diun:latest
    container_name: diun
    restart: unless-stopped
    env_file: ../.env
    environment:
      LOG_LEVEL: info
      DIUN_PROVIDERS_DOCKER: "true"
      DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT: "true"
      DIUN_NOTIF_NTFY_ENDPOINT: "https://ntfy.sh"
      DIUN_NOTIF_NTFY_TOPIC: "homelab-updates"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./diun/data:/data
    logging: *default-logging

  db:
    image: mariadb:10.11
    container_name: seafile-mysql
    restart: unless-stopped
    env_file: ../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${SEAFILE_MYSQL_ROOT_PASSWORD}
      MYSQL_LOG_CONSOLE: "true"
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - ./seafile/store/mysql:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost" ]
      interval: 30s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - seafile-net

  memcached:
    image: memcached:1.6
    container_name: seafile-memcached
    restart: unless-stopped
    command: memcached -m 256
    logging: *default-logging
    networks:
      - seafile-net

  seafile:
    image: seafileltd/seafile-mc:11.0-latest
    container_name: seafile
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "127.0.0.1:${SEAFILE_PORT}:80"
    volumes:
      - ./seafile/store/seafile:/shared
    environment:
      DB_HOST: db
      DB_ROOT_PASSWD: ${SEAFILE_MYSQL_ROOT_PASSWORD}
      TIME_ZONE: ${TZ}
      SEAFILE_ADMIN_EMAIL: ${SEAFILE_ADMIN_EMAIL}
      SEAFILE_ADMIN_PASSWORD: ${SEAFILE_ADMIN_PASSWORD}
      SEAFILE_SERVER_LETSENCRYPT: "false"
      SEAFILE_SERVER_HOSTNAME: family-gt-r.tail0e0df7.ts.net:8454
      SEAFILE_SERVER_PROTOCOL: https
    depends_on:
      db:
        condition: service_healthy
      memcached:
        condition: service_started
    logging: *default-logging
    networks:
      - seafile-net

networks:
  seafile-net:
